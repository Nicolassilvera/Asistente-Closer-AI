<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#a0e8ff"/>
      <stop offset="60%" stop-color="#0090ff"/>
      <stop offset="100%" stop-color="#0040c0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#40b0ff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0060ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0020a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>

  <!-- Halo exterior difuso -->
  <circle cx="50" cy="50" r="44" fill="url(#glow)" opacity="0.6"/>

  <!-- Anillo exterior con segmentos -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#1040a0" stroke-width="4"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#2080ff" stroke-width="2"
          stroke-dasharray="18 3 6 3 18 3 6 3 18 3 6 3 18 3 6 3" opacity="0.9"/>

  <!-- Anillo medio -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#0060d0" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#40a0ff" stroke-width="1"
          stroke-dasharray="14 4 5 4 14 4 5 4 14 4 5 4" stroke-dashoffset="5" opacity="0.8"
          filter="url(#softglow)"/>

  <!-- Anillo interno -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#1050b0" stroke-width="3"
          stroke-dasharray="10 3 4 3 10 3 4 3 10 3 4 3 10 3 4 3" stroke-dashoffset="2"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#60c0ff" stroke-width="1" opacity="0.5"/>

  <!-- Cruz de rayos del núcleo -->
  <g stroke="#80d8ff" stroke-width="1.5" opacity="0.85" filter="url(#softglow)">
    <line x1="50" y1="33" x2="50" y2="38"/>
    <line x1="50" y1="62" x2="50" y2="67"/>
    <line x1="33" y1="50" x2="38" y2="50"/>
    <line x1="62" y1="50" x2="67" y2="50"/>
    <line x1="39" y1="39" x2="42" y2="42"/>
    <line x1="58" y1="58" x2="61" y2="61"/>
    <line x1="61" y1="39" x2="58" y2="42"/>
    <line x1="42" y1="58" x2="39" y2="61"/>
  </g>

  <!-- Núcleo brillante -->
  <circle cx="50" cy="50" r="18" fill="url(#core)" filter="url(#coreglow)"/>

  <!-- Destello central -->
  <circle cx="50" cy="50" r="6" fill="#e8f8ff" opacity="0.95"/>
  <circle cx="50" cy="50" r="3" fill="#ffffff"/>
</svg>
